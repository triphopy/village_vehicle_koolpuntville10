name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - 'feature/**'   # ← เพิ่ม: trigger บน feature branch ด้วย

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write .clasprc.json
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SCRIPT_ID="${{ secrets.SCRIPT_ID_BLUE }}"
            ENV_LABEL="🔵 BLUE (Production)"
          else
            SCRIPT_ID="${{ secrets.SCRIPT_ID_GREEN }}"
            ENV_LABEL="🟢 GREEN (Staging)"
          fi

          echo "Deploying to $ENV_LABEL"
          echo "ScriptId: $SCRIPT_ID"

          echo '{
            "scriptId": "'"$SCRIPT_ID"'",
            "rootDir": "./src"
          }' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: clasp deploy --description "${{ github.event.head_commit.message }}"