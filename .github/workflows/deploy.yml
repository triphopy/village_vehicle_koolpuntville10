name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write .clasprc.json
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SCRIPT_ID="${{ secrets.SCRIPT_ID_BLUE }}"
            DEPLOYMENT_ID="${{ secrets.DEPLOYMENT_ID_BLUE }}"
            ENV_LABEL="🔵 BLUE (Production)"
          else
            SCRIPT_ID="${{ secrets.SCRIPT_ID_GREEN }}"
            DEPLOYMENT_ID="${{ secrets.DEPLOYMENT_ID_GREEN }}"
            ENV_LABEL="🟢 GREEN (Staging)"
          fi

          echo "Deploying to $ENV_LABEL"
          echo "ScriptId: $SCRIPT_ID"
          echo "DeploymentId: $DEPLOYMENT_ID"

          echo '{
            "scriptId": "'"$SCRIPT_ID"'",
            "rootDir": "./src"
          }' > .clasp.json

          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
          echo "ENV_LABEL=$ENV_LABEL" >> $GITHUB_ENV

      - name: Inject version info
        run: |
          DEPLOY_TIME=$(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M:%S')
          APP_VERSION="${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)"

          printf 'var VERSION_INFO = {\n  version: "%s",\n  env: "%s",\n  deployTime: "%s"\n};\n' \
            "$APP_VERSION" "$ENV_LABEL" "$DEPLOY_TIME" > ./src/versionInfo.js

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: clasp deploy --deploymentId $DEPLOYMENT_ID --description "${{ github.event.head_commit.message }}"

      - name: Summary
        run: echo "✅ Deployed to $ENV_LABEL successfully"